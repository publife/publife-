<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PubLife Partners | PubLife</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  font-family: 'Georgia', serif;
  color: white;
  background: black;
  overflow-x: hidden;
}

/* BACKGROUND */

.bg {
  position: fixed;
  inset: 0;

  background:
    url('partners-bg.jpg')
    center center / 75% auto no-repeat;

  background-color: #050505;

  z-index: -3;
}

.overlay {
  position: fixed;
  inset: 0;

  background:
    linear-gradient(
      rgba(0,0,0,0.76),
      rgba(0,0,0,0.88)
    );

  z-index: -2;
}

/* TOP BAR */

.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 16px;
  z-index: 100;
}

.menu-toggle {
  font-size: 28px;
  color: #ffffff;
  cursor: pointer;
}

/* MOBILE MENU */

.mobile-menu {
  position: fixed;
  top: 0;
  left: -300px;
  width: 260px;
  height: 100%;
  background: url('neon.jpg') center/cover no-repeat;
  padding: 80px 20px 40px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: 0.3s ease;
  z-index: 99;
  overflow-y: auto;
}

.mobile-menu::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.88);
}

.mobile-menu a {
  position: relative;
  color: white;
  text-decoration: none;
  font-size: 18px;
  padding: 12px;
  border-radius: 8px;
  z-index: 1;
  transition: 0.2s;
}

.mobile-menu a:hover {
  background: rgba(255,255,255,0.1);
}

.mobile-menu a:active {
  background: rgba(176,141,87,0.4);
}

.mobile-menu.active {
  left: 0;
}

/* GOLD LINKS */

.gold-link {
  color: #b08d57 !important;
  font-weight: bold;
}

/* MENU FOOTER */

.menu-footer {
  position: relative;
  margin-top: auto;
  padding-top: 40px;
  text-align: center;
  z-index: 1;
}

.menu-divider {
  position: relative;
  margin-bottom: 26px;
  height: 1px;
  background: rgba(176,141,87,0.6);
}

.menu-shield {
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  background: black;
  color: #b08d57;
  padding: 0 10px;
  font-size: 14px;
}

.menu-logo {
  width: 170px;
  max-width: 100%;
  margin-bottom: 10px;
}

.menu-tagline {
  color: #b08d57;
  font-size: 14px;
  font-style: italic;
  line-height: 1.5;
}

/* BACKDROP */

.menu-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 98;
}

.menu-backdrop.active {
  opacity: 1;
  pointer-events: all;
}

/* PAGE */

.wrapper {
  max-width: 1100px;
  margin: 0 auto;
  padding: 120px 20px 90px;
}

/* HERO */

.hero {
  text-align: center;
  margin-bottom: 70px;
}

.hero h1 {
  margin: 0;
  font-size: clamp(42px, 8vw, 78px);
  letter-spacing: 2px;
}

.hero-divider {
  width: 180px;
  height: 1px;
  background: rgba(176,141,87,0.55);
  margin: 24px auto;
}

.hero-sub {
  font-size: clamp(28px, 5vw, 44px);
  color: #b08d57;
  line-height: 1.3;
  font-weight: bold;
  margin-bottom: 28px;
}

.hero-text {
  max-width: 760px;
  margin: 0 auto;
  font-size: 22px;
  line-height: 1.8;
  color: #f0ece4;
}

/* SECTION PANEL */

.section-panel {
  background: rgba(0,0,0,0.56);
  border: 1px solid rgba(176,141,87,0.22);
  border-radius: 28px;
  padding: 42px 32px;
  backdrop-filter: blur(6px);
  margin-bottom: 40px;
}

/* TITLES */

.section-title {
  text-align: center;
  color: #b08d57;
  font-size: 38px;
  margin-top: 0;
  margin-bottom: 40px;
}

/* PARTNER WALL */

.partner-wall {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 22px;
}

.partner-tile {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(176,141,87,0.16);
  border-radius: 18px;
  padding: 28px 20px;
  text-align: center;
}

.partner-tile h3 {
  margin-top: 0;
  margin-bottom: 14px;
  color: #b08d57;
  font-size: 24px;
}

.partner-tile p {
  margin: 0;
  color: #ece7dd;
  line-height: 1.8;
  font-size: 16px;
}

/* FOUNDING */

.founding-text {
  text-align: center;
  max-width: 760px;
  margin: 0 auto;
  color: #ece7dd;
  font-size: 20px;
  line-height: 1.9;
}

.founding-note {
  margin-top: 24px;
  color: #b08d57;
  font-style: italic;
}

/* CTA */

.cta-strip {
  text-align: center;
}

.cta-strip h2 {
  font-size: 44px;
  margin-top: 0;
  margin-bottom: 24px;
}

.cta-strip p {
  max-width: 760px;
  margin: 0 auto 34px;
  font-size: 21px;
  line-height: 1.8;
  color: #ece7dd;
}

.cta-btn {
  display: inline-block;
  background: #b08d57;
  color: black;
  text-decoration: none;
  padding: 18px 34px;
  border-radius: 12px;
  font-size: 18px;
  font-weight: bold;
  box-shadow: 0 0 18px rgba(176,141,87,0.22);
}

/* FOOTER */

.footer {
  margin-top: 80px;
  text-align: center;
}

.footer-logo {
  width: 230px;
  max-width: 80%;
  margin-bottom: 18px;
}

.footer p {
  margin: 10px 0;
  color: #e8e1d3;
  line-height: 1.7;
}

.footer a {
  color: #b08d57;
  text-decoration: none;
}

.socials {
  display: flex;
  justify-content: center;
  gap: 18px;
  margin-top: 20px;
}

.socials img {
  width: 42px;
}

/* MOBILE */

@media (max-width: 700px) {

  .bg {
    background:
      url('partners-bg.jpg')
      center top / 140% auto no-repeat;

    background-color: #050505;
  }

  .wrapper {
    padding: 110px 18px 80px;
  }

  .hero-sub {
    font-size: 34px;
  }

  .hero-text {
    font-size: 18px;
  }

  .section-title {
    font-size: 30px;
  }

  .cta-strip h2 {
    font-size: 34px;
  }

  .cta-strip p,
  .founding-text {
    font-size: 18px;
  }

}

</style>
</head>
