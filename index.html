<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      width: 100%;
      height: 100%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 120%;
      opacity: 0.08;
      z-index: -1;
    }

    .banner {
      background: #e8e1d3;
      color: black;
      padding: 14px;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      padding: 30px 20px;
    }

    .logo {
      width: 260px;
      margin: 50px auto 30px auto;
      display: block;
    }

    .btn {
      display: block;
      margin: 14px 0;
      padding: 16px;
      text-decoration: none;
      border-radius: 10px;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .donate {
      border: 2px solid #e8e1d3;
      color: white;
    }

    .learn {
      background: rgba(0,0,0,0.6);
      color: white;
    }

    .footer {
      margin-top: 40px;
      font-size: 16px;
      line-height: 1.6;
    }

    .follow {
      margin-top: 25px;
      opacity: 0.8;
    }

    .socials a {
      display: inline-block;
      margin: 10px;
      padding: 12px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
      font-size: 16px;
      width: 40px;
    }
  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <!-- MAIN LOGO -->
    <img src="Logo.png" class="logo">

    <a href="apply.html" class="btn apply">APPLY HERE</a>
    <a href="#" class="btn donate">DONATE</a>
    <a href="#" class="btn learn">LEARN ABOUT PUBLIFE</a>

    <div class="footer">
      Kansas City, MO<br>
      info@publife.org

      <div class="follow">
        — Follow Us —
      </div>

      <div class="socials">
        <a href="#">f</a>
        <a href="#">ig</a>
      </div>
    </div>

  </div>

</body>
</html>
