<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PubLife</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

* { box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  margin: 0;
  font-family: 'Georgia', serif;
  color: white;
  background: black;
  overflow-x: hidden;
}

/* BACKGROUND */
.bg {
  position: fixed;
  inset: 0;
  background: url('bar-blur.jpg') center center / cover no-repeat;
  z-index: -3;
}

.overlay {
  position: fixed;
  inset: 0;
  background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.9));
  z-index: -2;
}

/* NAV */
.top-bar {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  padding: 16px;
  z-index: 10;
}

.menu-toggle {
  font-size: 26px;
  color: #e8e1d3;
  cursor: pointer;
}

/* SIDE MENU */
.mobile-menu {
  position: fixed;
  top: 0;
  left: -300px;
  width: 260px;
  height: 100%;
  background: url('neon.png') center/cover no-repeat;
  padding: 80px 20px;
  display: flex;
  flex-direction: column;
  gap: 12px;
  transition: 0.3s ease;
  z-index: 9;
}

.mobile-menu::before {
  content: "";
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.88);
}

.mobile-menu a {
  position: relative;
  color: white;
  text-decoration: none;
  font-size: 18px;
  padding: 12px;
  border-radius: 8px;
  z-index: 1;
  transition: 0.2s;
}

.mobile-menu a:hover {
  background: rgba(255,255,255,0.1);
}

.mobile-menu a:active {
  background: rgba(176,141,87,0.4);
}

.mobile-menu.active {
  left: 0;
}

/* BACKDROP */
.menu-backdrop {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  opacity: 0;
  pointer-events: none;
  transition: 0.3s;
  z-index: 8;
}

.menu-backdrop.active {
  opacity: 1;
  pointer-events: all;
}

/* HERO */
.hero-wrap {
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 24px 20px 32px;
}

/* CONTENT */
.content {
  width: 100%;
  max-width: 380px;
  margin: 0 auto;
  text-align: center;
}

/* HEADLINE */
.headline {
  font-size: clamp(28px, 7vw, 36px);
  line-height: 1.2;
  margin-bottom: 20px;
  font-weight: bold;
}

/* LOGO */
.logo {
  width: clamp(150px, 42vw, 240px);
  margin: 14px auto 20px;
  display: block;
}

/* MISSION */
.mission {
  font-size: clamp(16px, 3.2vw, 18px);
  line-height: 1.65;
  margin-bottom: 28px;
  color: #f4f1ea;
  font-weight: 600;
}

/* BUTTONS */
.btn {
  display: block;
  width: 100%;
  max-width: 340px;
  margin: 12px auto;
  padding: 16px;
  font-size: 17px;
  border-radius: 12px;
  text-decoration: none;
  text-align: center;
  transition: all 0.2s ease;
}

/* DONATE */
.donate {
  background: #b08d57;
  color: black;
  font-weight: bold;
  box-shadow: 0 0 12px rgba(176,141,87,0.4);
}

/* APPLY */
.apply {
  background: #e8e1d3;
  color: black;
}

/* FOOTER */
.footer {
  margin-top: 24px;
  font-size: 14px;
  text-align: center;
}

.footer a {
  color: #b08d57;
  text-decoration: underline;
}

/* SOCIALS */
.socials {
  margin-top: 16px;
  display: flex;
  justify-content: center;
  gap: 20px;
}

.socials img {
  width: 42px;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- NAV -->
<div class="top-bar">
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</div>

<div id="menuBackdrop" class="menu-backdrop" onclick="closeMenu()"></div>

<nav id="mobileMenu" class="mobile-menu">
  <a href="donate.html">Donate</a>
  <a href="about.html">About</a>
  <a href="how-it-works.html">How It Works</a>
  <a href="events.html">Events</a>
  <a href="apply.html">Apply for Assistance</a>
  <a href="volunteer.html">Volunteer</a>
  <a href="contact.html">Contact</a>
</nav>

<!-- HERO -->
<div class="hero-wrap">
  <div class="content">

    <div class="headline">
      Financial relief for hospitality workers.
    </div>

    <img src="Logo.png" class="logo">

    <div class="mission">
      PubLife provides direct financial assistance for hospitality workers facing medical emergencies.
    </div>

    <!-- UPDATED BUTTON -->
    <a href="donate.html" class="btn donate">DONATE NOW</a>

    <a href="apply.html" class="btn apply">APPLY HERE</a>

    <div class="footer">
      Kansas City, MO<br>
      <a href="mailto:info@publife.org">info@publife.org</a>

      <div class="socials">
        <a href="https://www.facebook.com/100069530393569/">
          <img src="facebook.png">
        </a>
        <a href="https://www.instagram.com/publifekc">
          <img src="instagram.png">
        </a>
      </div>
    </div>

  </div>
</div>

<script>
function toggleMenu() {
  document.getElementById("mobileMenu").classList.toggle("active");
  document.getElementById("menuBackdrop").classList.toggle("active");
}

function closeMenu() {
  document.getElementById("mobileMenu").classList.remove("active");
  document.getElementById("menuBackdrop").classList.remove("active");
}
</script>

</body>
</html>
