<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 180%;
      height: 180%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      transform: translate(-50%, -50%);
      opacity: 0.08;
      z-index: -1;
    }

    .banner {
      background: #e8e1d3;
      color: black;
      padding: 24px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 16px;
      max-width: 520px;
      margin: auto;
    }

    .logo {
      width: 100%;
      max-width: 520px;
      margin-bottom: 8px;
    }

    .btn {
      width: 100%;
      max-width: 520px;
      padding: 34px;
      font-size: 28px;
      border-radius: 14px;
      letter-spacing: 2px;
      margin: 2px 0;
      text-decoration: none;
      display: block;
    }

    .learn {
      border: 5px solid white;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    .events {
      border: 4px solid #888;
      color: white;
    }

    .donate {
      border: 4px solid #b08d57;
      color: white;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .footer {
      margin-top: 6px;
      font-size: 16px;
    }

    .socials span {
      display: inline-block;
      margin: 6px;
      padding: 10px;
      width: 42px;
      font-size: 16px;
    }

    .fb {
      border: 2px solid #1877f2;
    }

    .ig {
      border: 2px solid #e1306c;
    }

    /* INFO SECTION (SCROLL TARGET) */
    .info-section {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: 100vh;
      background: #0b0b0b;
      color: white;
      padding: 40px 20px;
      overflow-y: auto;
      display: none;
      z-index: 10;
    }

  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <img src="Logo.png" class="logo">

    <!-- BUTTONS -->
    <a href="#" class="btn learn" onclick="openInfo()">LEARN ABOUT PUBLIFE</a>
    <a href="events.html" class="btn events">EVENTS</a>
    <a href="https://gofund.me/35bd90c1a" class="btn donate" target="_blank">DONATE</a>
    <a href="apply.html" class="btn apply">APPLY HERE</a>

    <div class="footer">
      Kansas City, MO<br>
      <a href="mailto:info@publife.org" style="color:white;">info@publife.org</a>

      <div class="socials">
        <a href="https://www.facebook.com/100069530393569/" target="_blank"><span class="fb">f</span></a>
        <a href="https://www.instagram.com/publifekc" target="_blank"><span class="ig">ig</span></a>
      </div>
    </div>

  </div>

  <!-- INFO SECTION -->
  <div id="info" class="info-section">
    <h2>About PubLife</h2>
    <p>
      PubLife exists to serve the ones who serve us.
    </p>

    <p>
      Full handbook and details will be available here at launch.
    </p>

    <br><br>
    <button onclick="closeInfo()">Close</button>
  </div>

  <script>
    function openInfo() {
      document.getElementById('info').style.display = 'block';
    }

    function closeInfo() {
      document.getElementById('info').style.display = 'none';
    }
  </script>

</body>
</html>
