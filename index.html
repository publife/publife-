<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 180%;
      height: 180%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      transform: translate(-50%, -50%);
      opacity: 0.08;
      z-index: -1;
    }

    .banner {
      background: #e8e1d3;
      color: black;
      padding: 24px;
      font-size: 24px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 16px;
    }

    .logo {
      width: 95%;
      max-width: 420px;
      margin-bottom: 10px;
    }

    /* 🔥 BIG + STACKED BUTTONS */
    .btn {
      width: 100%;
      max-width: 460px;
      padding: 30px;
      font-size: 26px;
      border-radius: 14px;
      letter-spacing: 2px;
      margin: 4px 0; /* VERY TIGHT */
    }

    .learn {
      border: 5px solid white;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    .donate {
      border: 4px solid #b08d57;
      color: white;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .footer {
      margin-top: 8px;
      font-size: 16px;
    }

    .socials span {
      display: inline-block;
      margin: 6px;
      padding: 10px;
      width: 42px;
      font-size: 16px;
    }

    .fb {
      border: 2px solid #1877f2;
    }

    .ig {
      border: 2px solid #e1306c;
    }

  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <img src="Logo.png" class="logo">

    <!-- 🔥 ORDER IS VERY CLEAR NOW -->
    <div class="btn learn">LEARN ABOUT PUBLIFE</div>
    <div class="btn donate">DONATE</div>
    <div class="btn apply">APPLY HERE</div>

    <div class="footer">
      Kansas City, MO<br>
      info@publife.org

      <div class="socials">
        <span class="fb">f</span>
        <span class="ig">ig</span>
      </div>
    </div>

  </div>

</body>
</html>
