
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubLife</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:#f5f5f5;
background:#0b0b0b;
text-align:center;
overflow-x:hidden;
}

/* Background logo */
.bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
opacity:0.07;
width:130%;
max-width:1100px;
z-index:0;
pointer-events:none;
}

/* Banner */
.banner{
position:fixed;
top:0;
left:0;
width:100%;
background:#0f0f0f;
color:#ffffff;
padding:35px 20px;
font-size:22px;
font-weight:800;
line-height:1.6;
border-bottom:2px solid #333;
z-index:2;
box-sizing:border-box;
word-wrap:break-word;
}

/* Container */
.container{
position:relative;
z-index:1;
max-width:900px;
margin:0 auto;
padding-top:280px;
padding-bottom:100px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* Logo */
.logo{
width:360px;
max-width:85%;
margin-bottom:40px;
display:block;
}

/* Headline */
h1{
font-size:48px;
font-weight:900;
margin-bottom:40px;
}

/* Buttons container */
.buttons{
margin-top:20px;
}

/* Buttons */
.buttons a{
display:inline-block;
margin:15px;
padding:20px 40px;
border-radius:14px;
text-decoration:none;
font-size:22px;
font-weight:800;
transition:0.25s;
}

/* Colors */
.fb{
background:#1877F2;
color:white;
}

.ig{
background:#E1306C;
color:white;
}

.donate{
background:#d4af37;
color:black;
transform:scale(1.08);
}

/* Hover */
.buttons a:hover{
opacity:0.85;
}

/* Subtext */
.subtext{
margin-top:25px;
font-size:18px;
opacity:0.85;
max-width:550px;
line-height:1.5;
}

</style>
</head>

<body>

<!-- Background logo -->
<img src="inverted logo.png" class="bg-logo">

<!-- Banner -->
<div class="banner">
PubLife is launching in Kansas City to support hospitality workers facing medical hardship. Follow our progress and support the mission below.
</div>

<div class="container">

<!-- Logo -->
<img src="Logo.png" class="logo">

<h1>Serving the Ones Who Serve Us</h1>

<div class="buttons">

<a href="https://www.facebook.com/100069530393569/" target="_blank" class="fb">
Facebook
</a>

<a href="https://instagram.com/" target="_blank" class="ig">
Instagram
</a>

<a href="#" class="donate">
Donate Now
</a>

</div>

<div class="subtext">
100% of early support helps us launch aid for local service industry workers.
</div>

</div>

</body>
</html>
