<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
    }

    /* BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 180%;
      height: 180%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      transform: translate(-50%, -50%);
      opacity: 0.08;
      z-index: -1;
    }

    /* BANNER */
    .banner {
      background: #e8e1d3;
      color: black;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    /* FIXED HERO (NO 100vh) */
    .container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 40px 16px 20px 16px;
      max-width: 520px;
      margin: auto;
      box-sizing: border-box;
    }

    .logo {
      width: 100%;
      max-width: 520px;
      margin-bottom: 10px;
    }

    /* BUTTONS */
    .btn {
      display: block;
      width: 100%;
      max-width: 520px;
      padding: 28px;
      font-size: 24px;
      border-radius: 14px;
      letter-spacing: 2px;
      margin: 6px 0;
      text-decoration: none;
      box-sizing: border-box;
    }

    .learn {
      border: 4px solid white;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    .donate {
      border: 4px solid #b08d57;
      color: white;
    }

    .events {
      border: 3px solid #888;
      color: white;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .footer {
      margin-top: 10px;
      font-size: 15px;
      line-height: 1.5;
    }

    .socials a {
      display: inline-block;
      margin: 8px;
      padding: 12px;
      width: 50px;
      font-size: 18px;
      text-decoration: none;
      color: white;
    }

    .fb {
      border: 2px solid #1877f2;
    }

    .ig {
      border: 2px solid #e1306c;
    }

    /* INFO SECTION */
    .info-section {
      padding: 60px 20px;
      max-width: 700px;
      margin: auto;
      line-height: 1.6;
      font-size: 18px;
    }

    .info-section h2 {
      margin-top: 30px;
    }

  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <img src="Logo.png" class="logo">

    <a href="#info" class="btn learn">LEARN ABOUT PUBLIFE</a>
    <a href="https://gofund.me/35bd90c1a" class="btn donate">DONATE</a>
    <a href="events.html" class="btn events">EVENTS</a>
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdKpOEOkWrPTuFdVwzGI-p1SzdEHQxE7uUNGg3YwKUdEGWIBQ/viewform" class="btn apply">APPLY HERE</a>

    <div class="footer">
      Kansas City, MO<br>
      <a href="mailto:info@publife.org" style="color:white;">info@publife.org</a>

      <div class="socials">
        <a href="https://www.facebook.com/100069530393569/" class="fb">f</a>
        <a href="https://www.instagram.com/publifekc" class="ig">ig</a>
      </div>
    </div>

  </div>

  <div id="info" class="info-section">
    <!-- (keep your existing info content here unchanged) -->
  </div>

</body>
</html>
