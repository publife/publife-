
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubLife</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:#f5f5f5;
background:#0b0b0b;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
min-height:100vh;
text-align:center;
}

/* Background logo */
.bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
opacity:0.07;
width:95%;
max-width:900px;
z-index:0;
}

/* Banner */
.banner{
position:fixed;
top:0;
width:100%;
background:#121212;
color:#eaeaea;
padding:18px 20px;
font-size:16px;
font-weight:600;
line-height:1.5;
border-bottom:1px solid #2a2a2a;
z-index:2;
}

/* Main container */
.container{
position:relative;
z-index:1;
max-width:700px;
padding:120px 20px 40px;
}

/* Logo */
.logo{
width:180px;
margin-bottom:25px;
}

/* Headline */
h1{
font-size:36px;
font-weight:700;
margin-bottom:15px;
}

/* Buttons */
.buttons a{
display:inline-block;
margin:12px;
padding:16px 32px;
border-radius:10px;
border:2px solid #ffffff;
color:#ffffff;
text-decoration:none;
font-size:18px;
font-weight:600;
transition:0.25s;
}

.buttons a:hover{
background:#ffffff;
color:#000000;
}

/* Slight color warmth */
.highlight{
color:#d6d6d6;
}

</style>

</head>

<body>

<!-- Background logo -->
<img src="inverted logo.png" class="bg-logo">

<!-- Banner -->
<div class="banner">
PubLife is launching in Kansas City to support hospitality workers facing medical hardship. Follow our progress and support the mission below.
</div>

<div class="container">

<!-- Top logo -->
<img src="Logo.png" class="logo">

<h1 class="highlight">Serving the Ones Who Serve Us</h1>

<div class="buttons">

<a href="https://www.facebook.com/100069530393569/" target="_blank">
Facebook
</a>

<a href="https://instagram.com/" target="_blank">
Instagram
</a>

<a href="#">
GoFundMe (Coming Soon)
</a>

</div>

</div>

</body>
</html>
