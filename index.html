<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
    }

    /* KEEP BACKGROUND EXACTLY */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 150%;
      height: 150%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      transform: translate(-50%, -50%);
      opacity: 0.08;
      z-index: -1;
    }

    /* BIGGER BANNER */
    .banner {
      background: #e8e1d3;
      color: black;
      padding: 22px;
      font-size: 22px;
      letter-spacing: 1.5px;
      font-weight: bold;
    }

    .container {
      width: 100%;
      max-width: 480px;
      margin: auto;
      padding: 80px 20px 60px 20px; /* PUSH CONTENT DOWN */
      box-sizing: border-box;
    }

    /* LOGO */
    .logo {
      width: 90%;
      max-width: 400px;
      margin: 0 auto 25px auto;
      display: block;
    }

    /* MUCH LARGER BUTTONS */
    .btn {
      display: block;
      margin: 16px auto;
      padding: 22px;
      text-decoration: none;
      border-radius: 12px;
      font-size: 20px;
      letter-spacing: 1.5px;
      width: 100%;
      box-sizing: border-box;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .donate {
      border: 2px solid #e8e1d3;
      color: white;
    }

    .learn {
      background: rgba(0,0,0,0.6);
      color: white;
    }

    /* BIGGER TEXT */
    .footer {
      margin-top: 40px;
      font-size: 18px;
      line-height: 1.8;
    }

    .follow {
      margin-top: 25px;
      font-size: 18px;
      opacity: 0.9;
    }

    /* BIGGER SOCIAL BUTTONS */
    .socials span {
      display: inline-block;
      margin: 12px;
      padding: 16px;
      border: 1px solid white;
      color: white;
      font-size: 18px;
      width: 50px;
    }
  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <img src="Logo.png" class="logo">

    <div class="btn apply">APPLY HERE</div>
    <div class="btn donate">DONATE</div>
    <div class="btn learn">LEARN ABOUT PUBLIFE</div>

    <div class="footer">
      Kansas City, MO<br>
      info@publife.org

      <div class="follow">
        — Follow Us —
      </div>

      <div class="socials">
        <span>f</span>
        <span>ig</span>
      </div>
    </div>

  </div>

</body>
</html>
