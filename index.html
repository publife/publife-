<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
    }

    /* CENTERED BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 160%;
      height: 160%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      transform: translate(-50%, -50%);
      opacity: 0.08;
      z-index: -1;
    }

    .banner {
      background: #e8e1d3;
      color: black;
      padding: 12px;
      font-size: 16px;
      letter-spacing: 1px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 10px 20px 40px 20px;
    }

    /* MUCH BIGGER LOGO */
    .logo {
      width: 380px;
      max-width: 95%;
      margin: 30px auto 10px auto;
      display: block;
    }

    /* BUTTONS BIGGER + TIGHTER */
    .btn {
      display: block;
      margin: 10px 0;
      padding: 18px;
      text-decoration: none;
      border-radius: 12px;
      font-size: 18px;
      letter-spacing: 1px;
      width: 100%;
      box-sizing: border-box;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .donate {
      border: 2px solid #e8e1d3;
      color: white;
    }

    .learn {
      background: rgba(0,0,0,0.6);
      color: white;
    }

    .footer {
      margin-top: 30px;
      font-size: 16px;
      line-height: 1.6;
    }

    .follow {
      margin-top: 20px;
      opacity: 0.8;
    }

    .socials span {
      display: inline-block;
      margin: 10px;
      padding: 14px;
      border: 1px solid white;
      color: white;
      font-size: 16px;
      width: 45px;
    }
  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <img src="Logo.png" class="logo">

    <div class="btn apply">APPLY HERE</div>
    <div class="btn donate">DONATE</div>
    <div class="btn learn">LEARN ABOUT PUBLIFE</div>

    <div class="footer">
      Kansas City, MO<br>
      info@publife.org

      <div class="follow">
        — Follow Us —
      </div>

      <div class="socials">
        <span>f</span>
        <span>ig</span>
      </div>
    </div>

  </div>

</body>
</html>
