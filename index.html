<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 180%;
      height: 180%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      transform: translate(-50%, -50%);
      opacity: 0.08;
      z-index: -1;
    }

    .banner {
      background: #e8e1d3;
      color: black;
      padding: 20px;
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 2px;
    }

    .container {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 0 16px;
    }

    .logo {
      width: 92%;
      max-width: 400px;
      margin-bottom: 8px;
    }

    /* 🔧 REFINED BUTTON SCALE */
    .btn {
      width: 100%;
      max-width: 440px;
      padding: 24px;
      font-size: 22px;
      border-radius: 12px;
      letter-spacing: 1.5px;
      margin: 3px 0;
    }

    .learn {
      border: 4px solid white;
      background: rgba(0,0,0,0.6);
      color: white;
    }

    .donate {
      border: 3px solid #b08d57;
      color: white;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .footer {
      margin-top: 18px;
      font-size: 15px;
    }

    .socials span {
      display: inline-block;
      margin: 6px;
      padding: 10px;
      width: 42px;
      font-size: 16px;
    }

    .fb {
      border: 2px solid #1877f2;
    }

    .ig {
      border: 2px solid #e1306c;
    }

  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <img src="Logo.png" class="logo">

    <div class="btn learn">LEARN ABOUT PUBLIFE</div>
    <div class="btn donate">DONATE</div>
    <div class="btn apply">APPLY HERE</div>

    <div class="footer">
      Kansas City, MO<br>
      info@publife.org

      <div class="socials">
        <span class="fb">f</span>
        <span class="ig">ig</span>
      </div>
    </div>

  </div>

</body>
</html
