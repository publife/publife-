<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: #0b0b0b;
      color: white;
      font-family: 'Georgia', serif;
      text-align: center;
    }

    /* KEEP BACKGROUND */
    body::before {
      content: "";
      position: fixed;
      top: 50%;
      left: 50%;
      width: 150%;
      height: 150%;
      background-image: url('inverted logo.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      transform: translate(-50%, -50%);
      opacity: 0.08;
      z-index: -1;
    }

    /* BIG, PROMINENT BANNER */
    .banner {
      background: #e8e1d3;
      color: black;
      padding: 30px;
      font-size: 26px;
      letter-spacing: 2px;
      font-weight: bold;
    }

    .container {
      width: 100%;
      max-width: 520px;
      margin: auto;
      padding: 140px 20px 80px 20px; /* DROP CONTENT DOWN ~7 LINES */
      box-sizing: border-box;
    }

    .logo {
      width: 95%;
      max-width: 420px;
      margin: 0 auto 40px auto;
      display: block;
    }

    /* LARGE BUTTONS */
    .btn {
      display: block;
      margin: 20px auto;
      padding: 26px;
      text-decoration: none;
      border-radius: 14px;
      font-size: 24px;
      letter-spacing: 2px;
      width: 100%;
      box-sizing: border-box;
    }

    .apply {
      background: #e8e1d3;
      color: black;
    }

    .donate {
      border: 2px solid #e8e1d3;
      color: white;
    }

    .learn {
      background: rgba(0,0,0,0.6);
      color: white;
    }

    /* LARGE TEXT */
    .footer {
      margin-top: 50px;
      font-size: 22px;
      line-height: 2;
    }

    .follow {
      margin-top: 30px;
      font-size: 20px;
      opacity: 0.9;
    }

    /* SOCIAL BUTTONS BIGGER */
    .socials span {
      display: inline-block;
      margin: 14px;
      padding: 18px;
      border: 1px solid white;
      color: white;
      font-size: 20px;
      width: 60px;
    }
  </style>
</head>

<body>

  <div class="banner">
    Official Launch Coming Soon
  </div>

  <div class="container">

    <img src="Logo.png" class="logo">

    <div class="btn apply">APPLY HERE</div>
    <div class="btn donate">DONATE</div>
    <div class="btn learn">LEARN ABOUT PUBLIFE</div>

    <div class="footer">
      Kansas City, MO<br>
      info@publife.org

      <div class="follow">
        — Follow Us —
      </div>

      <div class="socials">
        <span>f</span>
        <span>ig</span>
      </div>
    </div>

  </div>

</body>
</html>
