<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>PubLife</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      background-color: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
    }

    body::before {
      content: "";
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('emblem.png');
      background-repeat: no-repeat;
      background-position: center;
      background-size: 120%;
      opacity: 0.05;
      z-index: -1;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 40px 20px;
    }

    .banner {
      font-size: 18px;
      margin-bottom: 30px;
      opacity: 0.8;
    }

    .logo {
      width: 220px;
      margin: 20px auto;
    }

    .btn {
      display: block;
      margin: 15px 0;
      padding: 16px;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .apply {
      background: white;
      color: black;
    }

    .donate {
      border: 2px solid white;
      color: white;
      font-size: 18px;
    }

    .learn {
      color: white;
      opacity: 0.6;
    }

    .footer {
      margin-top: 50px;
      font-size: 14px;
      opacity: 0.8;
    }

    .socials a {
      display: inline-block;
      margin: 10px;
      padding: 10px 12px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
      font-size: 12px;
    }
  </style>
</head>

<body>

  <div class="container">

    <div class="banner">
      Official Launch Coming Soon
    </div>

    <img src="logo.png" class="logo">

    <a href="apply.html" class="btn apply">APPLY HERE</a>
    <a href="https://gofundme.com/YOUR-LINK" class="btn donate">DONATE</a>
    <a href="#" class="btn learn">LEARN ABOUT PUBLIFE</a>

    <div class="footer">
      Kansas City, MO<br><br>

      <a href="mailto:info@publife.org" style="color:white;">
        info@publife.org
      </a>

      <div class="socials">
        <a href="#">FB</a>
        <a href="#">IG</a>
      </div>
    </div>

  </div>

</body>
</html>
