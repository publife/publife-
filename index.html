
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PubLife</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:#f5f5f5;
background:#0b0b0b;
display:flex;
flex-direction:column;
align-items:center;
min-height:100vh;
text-align:center;
}

/* Background logo */
.bg-logo{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%, -50%);
opacity:0.08;
width:120%;
max-width:1000px;
z-index:0;
}

/* Banner */
.banner{
position:fixed;
top:0;
width:100%;
background:#111;
color:#ffffff;
padding:25px 20px;
font-size:20px;
font-weight:700;
line-height:1.6;
border-bottom:2px solid #333;
z-index:2;
}

/* Container */
.container{
position:relative;
z-index:1;
max-width:800px;
padding:160px 20px 40px;
}

/* Logo */
.logo{
width:320px;
margin-bottom:25px;
}

/* Headline */
h1{
font-size:42px;
font-weight:800;
margin-bottom:20px;
}

/* Buttons */
.buttons a{
display:inline-block;
margin:12px;
padding:18px 36px;
border-radius:12px;
text-decoration:none;
font-size:20px;
font-weight:700;
transition:0.25s;
}

/* Button colors */
.fb{
background:#1877F2;
color:white;
}

.ig{
background:#E1306C;
color:white;
}

.donate{
background:#d4af37;
color:black;
}

/* Hover */
.buttons a:hover{
opacity:0.85;
}

.subtext{
margin-top:10px;
font-size:16px;
opacity:0.85;
}

</style>
</head>

<body>

<img src="inverted logo.png" class="bg-logo">

<div class="banner">
PubLife is launching in Kansas City to support hospitality workers facing medical hardship. Follow our progress and support the mission below.
</div>

<div class="container">

<img src="Logo.png" class="logo">

<h1>Serving the Ones Who Serve Us</h1>

<div class="buttons">

<a href="https://www.facebook.com/100069530393569/" target="_blank" class="fb">
Facebook
</a>

<a href="https://instagram.com/" target="_blank" class="ig">
Instagram
</a>

<a href="#" class="donate">
Donate Now
</a>

</div>

<div class="subtext">
100% of early support helps us launch aid for local service industry workers.
</div>

</div>

</body>
</html>
